services:
  nexarr-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: builder
    container_name: nexarr-v2-dev
    ports:
      - "3000:3000"
      - "5173:5173"
    volumes:
      - ../packages:/app/packages
      - ../data:/app/data
      - ../.env:/app/packages/server/.env:ro
    environment:
      - NODE_ENV=development
    command: npm run dev
