services:
  nexarr:
    image: ghcr.io/sebastianklingk/nexarr:v2-latest
    container_name: nexarr-v2
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/system/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
